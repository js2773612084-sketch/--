<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>520 情感账户全面资产审查</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: #fff1f2;
      color: #881337;
    }

    /* 粉色流动渐变背景 */
    .main-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(270deg, #ffe4e6, #fff1f2, #ffe4e6, #fff1f2, #ffe4e6);
      background-size: 800% 800%;
      animation: movingGradient 30s ease infinite;
    }

    @keyframes movingGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 动态 Canvas 爱心雨 */
    #heartCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* 伪装磨砂玻璃卡片 */
    .glass-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid #f43f5e;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 35px rgba(244, 63, 94, 0.15);
      text-align: center;
      max-width: 38rem;
      width: 90%;
      box-sizing: border-box;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: vividPulse 8s infinite alternate;
    }

    @keyframes vividPulse {
      0% { transform: scale(1); box-shadow: 0 15px 35px rgba(244, 63, 94, 0.15); }
      100% { transform: scale(1.02); box-shadow: 0 15px 45px rgba(244, 63, 94, 0.25); }
    }

    /* 双栏合并终极卡片样式 */
    .glass-card.final-layout {
      max-width: 52rem;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2rem;
      padding: 2.5rem;
      text-align: left;
    }

    .final-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .final-right {
      width: 240px;
      flex-shrink: 0;
    }

    .final-photo {
      width: 100%;
      border-radius: 16px;
      border: 3px solid #f43f5e;
      box-shadow: 0 8px 24px rgba(244, 63, 94, 0.3);
      animation: photoBounce 4s ease-in-out infinite;
    }

    @keyframes photoBounce {
      0%, 100% { transform: translateY(0) rotate(2deg); }
      50% { transform: translateY(-8px) rotate(-2deg); }
    }

    @media (max-width: 768px) {
      .glass-card.final-layout {
        flex-direction: column;
        text-align: center;
        padding: 2rem 1.5rem;
      }
      .final-right {
        width: 180px;
        margin-top: 1rem;
      }
    }

    h1 {
      font-size: 2.2rem;
      color: #e11d48;
      margin-top: 0;
      margin-bottom: 1.5rem;
      animation: vividTilt 6s infinite ease-in-out;
    }

    @keyframes vividTilt {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(1deg); }
    }

    .subtitle {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #4c0519;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      outline: none;
      font-family: inherit;
      border: none;
      border-radius: 999px;
      font-size: 1.1rem;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
      position: relative;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      color: white;
      box-shadow: 0 4px 14px rgba(244, 63, 94, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 63, 94, 0.6);
    }

    .btn-secondary {
      background: #fff1f2;
      color: #e11d48;
      border: 1px solid #fda4af;
    }

    button::after {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    button:hover::after { opacity: 1; }

    /* 输入框 */
    .fake-input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #fbcfe8;
      border-radius: 12px;
      font-size: 1.1rem;
      color: #e11d48;
      background: white;
      box-sizing: border-box;
      outline: none;
      text-align: center;
      transition: all 0.3s ease;
    }
    .fake-input:focus {
      border-color: #f43f5e;
      box-shadow: 0 0 10px rgba(244, 63, 94, 0.3);
    }

    /* 扫描器 */
    .radar-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 20px;
    }
    .radar-box {
      position: absolute;
      inset: 0;
      border: 3px solid #fda4af;
      border-radius: 50%;
      overflow: hidden;
      background: #fff1f2;
      z-index: 2;
    }
    .radar-face-preview {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      object-fit: cover;
      filter: blur(15px); /* 初始极度模糊 */
      transition: filter 4s linear;
      z-index: 1;
    }
    .radar-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(244,63,94,0), rgba(244,63,94,0.5));
      animation: scan 1.5s linear infinite;
      transform-origin: bottom center;
      z-index: 3;
    }
    @keyframes scan {
      0% { transform: translateY(-160px); }
      100% { transform: translateY(160px); }
    }

    /* 协议勾选 */
    .permission-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      background: white;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid #ffe4e6;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #f43f5e;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
      transform: translateX(24px);
    }

    /* 警告弹窗 */
    .alert-popup {
      position: absolute;
      width: 280px;
      background: #fff1f2;
      border: 2px solid #ef4444;
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 20px 25px -5px rgba(159, 18, 57, 0.2);
      color: #991b1b;
      z-index: 99999;
      animation: vividPopup 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    @keyframes vividPopup {
      0% { transform: scale(0.1) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* 进度条 */
    .progress-bound {
      width: 100%;
      height: 16px;
      background: #ffe4e6;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #fbcfe8;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f43f5e, #db2777);
      transition: width 0.1s linear;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-10px, 0); }
      20%, 40%, 60%, 80% { transform: translate(10px, 0); }
    }
    .shake-effect { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body>

  <div class="main-container" id="stageContainer">
    <canvas id="heartCanvas"></canvas>

    <div class="glass-card" id="mainCard">
      <h1>🌸 520 情感账户核心资产审查</h1>
      <p class="subtitle">
        检测到您的IP地址在“深情领地”异常登录。<br>
        为了您的财产与智商安全，请协助完成以下网络人格五轨审查。<br>
        <span style="color:#e11d48; font-size:0.9rem; font-weight:bold;">* 拒绝验证将导致脱单功能永久锁定 *</span>
      </p>

      <div class="btn-group">
        <button id="btnYes" class="btn-primary">接受审查 ✨</button>
        <button id="btnNo" class="btn-secondary">老子不验 🙅</button>
      </div>
    </div>
  </div>

  <script>
    const mainCard = document.getElementById('mainCard');
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    
    // 你的专属恶搞照片文件名定义
    const MY_PHOTO = "sun.jpg";

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Canvas 爱心粒子发射系统
    const hearts = [];
    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -Math.random() * canvas.height;
        this.size = Math.random() * 20 + 12;
        this.speed = Math.random() * 2 + 1.5;
        this.drift = Math.sin(Math.random() * 2) * 0.4;
        this.color = Math.random() < 0.6 ? '#f43f5e' : '#fda4af';
        this.opacity = Math.random() * 0.5 + 0.4;
      }
      update() {
        this.y += this.speed;
        this.x += this.drift;
        if (this.y > canvas.height) {
          this.y = -this.size;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.font = `${this.size}px serif`;
        ctx.fillText('❤️', this.x, this.y);
        ctx.restore();
      }
    }

    for (let i = 0; i < 55; i++) { hearts.push(new Heart()); }

    function animateHearts() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(h => { h.update(); h.draw(); });
      requestAnimationFrame(animateHearts);
    }
    animateHearts();

    // ==================== 关卡 1：拒绝者的无休止弹窗 ====================
    let rejectCount = 0;
    const initPrank = () => {
      const btnNo = document.getElementById('btnNo');
      if(!btnNo) return;
      
      const escapeAndPrank = (e) => {
        rejectCount++;
        if (rejectCount <= 3) {
          const maxX = window.innerWidth - 150;
          const maxY = window.innerHeight - 60;
          btnNo.style.position = 'fixed';
          btnNo.style.left = `${Math.max(20, Math.random() * maxX)}px`;
          btnNo.style.top = `${Math.max(20, Math.random() * maxY)}px`;
          btnNo.innerText = `点不到我 😜 (${rejectCount}/3)`;
        } else {
          triggerWarningPopups();
        }
      };
      btnNo.addEventListener('mouseenter', escapeAndPrank);
      btnNo.addEventListener('click', escapeAndPrank);
    };

    function triggerWarningPopups() {
      mainCard.classList.add('shake-effect');
      setTimeout(() => mainCard.classList.remove('shake-effect'), 500);

      for (let i = 0; i < 10; i++) {
        setTimeout(() => {
          const popup = document.createElement('div');
          popup.className = 'alert-popup';
          popup.innerHTML = `
            <h3 style="margin:0;color:#ef4444;">🚨 严重警告 (Error_520)</h3>
            <p style="font-size:0.9rem;color:#991b1b;line-height:1.5;margin:10px 0;">
              检测到您正在强行嘴硬！拒绝配合审查将剥夺2026年度脱单资格！
            </p>
            <button onclick="this.parentElement.remove()" style="width:100%;background:#ef4444;color:white;padding:6px;border:none;border-radius:999px;font-size:0.9rem;cursor:pointer;font-weight:bold;">
              我错了，马上配合 😭
            </button>
          `;
          popup.style.left = `${Math.random() * (window.innerWidth - 280)}px`;
          popup.style.top = `${Math.random() * (window.innerHeight - 150)}px`;
          document.body.appendChild(popup);
        }, i * 120);
      }
      const btnNo = document.getElementById('btnNo');
      if(btnNo) {
        btnNo.style.position = 'static';
        btnNo.innerText = "我认输，我验证";
        btnNo.onclick = startStage2;
      }
    }

    document.getElementById('btnYes').onclick = startStage2;
    initPrank();

    // ==================== 关卡 2：真心话流氓输入 ====================
    function startStage2() {
      document.querySelectorAll('.alert-popup').forEach(p => p.remove());
      
      mainCard.innerHTML = `
        <h1>📝 第一轨：反傲娇内心剖析</h1>
        <p class="subtitle" style="margin-bottom:1.5rem;">请在下方输入框内，如实输入你的【520年度脱单宣言】：</p>
        <input type="text" id="typewriterInput" class="fake-input" placeholder="请在这里随意打字敲击键盘..." autocomplete="off">
        <div class="btn-group">
          <button id="btnStage2" class="btn-primary" style="opacity:0.5; cursor:not-allowed;" disabled>请先完成输入</button>
        </div>
      `;

      const targetText = "本人自愿承认其实我是一个表面嘴硬、内心极度渴望恋爱的绝世大冤种，并申请向站长发放520巨额赞助。";
      const inputEl = document.getElementById('typewriterInput');
      const btnEl = document.getElementById('btnStage2');
      let currentLength = 0;

      inputEl.addEventListener('keydown', (e) => {
        e.preventDefault();
        if (e.key === 'Backspace') {
          if (currentLength > 0) {
            currentLength--;
            inputEl.value = targetText.substring(0, currentLength);
          }
        } else if (e.key.length === 1 || e.key === 'Process') {
          if (currentLength < targetText.length) {
            currentLength++;
            inputEl.value = targetText.substring(0, currentLength);
          }
        }

        if (currentLength >= targetText.length) {
          btnEl.removeAttribute('disabled');
          btnEl.style.opacity = '1';
          btnEl.style.cursor = 'pointer';
          btnEl.innerText = "承认事实，进入下一步 🤝";
        }
      });

      btnEl.onclick = startStage3;
    }

    // ==================== 关卡 3：AI 偏好人脸透视（增加模糊照片渐显效果） ====================
    function startStage3() {
      mainCard.innerHTML = `
        <h1>📷 第二轨：AI 脸部多巴胺扫描</h1>
        <p class="subtitle" style="margin-bottom:1.5rem;">系统正在尝试调用前置摄像头，分析您的面部异性吸引力指数...</p>
        <div class="radar-container">
          <div class="radar-box">
            <div class="radar-line"></div>
            <img src="${MY_PHOTO}" class="radar-face-preview" id="radarImg">
          </div>
        </div>
        <p id="scanStatus" style="font-weight:bold; color:#db2777;">正在捕捉面部轮廓，请正对屏幕并保持微笑...</p>
      `;

      const statusText = document.getElementById('scanStatus');
      const radarImg = document.getElementById('radarImg');
      
      // 随着时间推移，扫描框里的照片逐渐稍微清晰一点点
      setTimeout(() => { if(radarImg) radarImg.style.filter = "blur(6px)"; }, 1500);

      const phases = [
        "正在扫描胶原蛋白流失速度...",
        "正在分析单身狗特有的傲娇眼神...",
        "正在测算嘴角向下微垂的倔强弧度...",
        "扫描完成！"
      ];

      phases.forEach((text, index) => {
        setTimeout(() => {
          if(statusText) statusText.innerText = text;
          if(index === phases.length - 1) { showScanResult(); }
        }, (index + 1) * 1200);
      });
    }

    function showScanResult() {
      mainCard.innerHTML = `
        <h1>📊 扫描分析结果报告</h1>
        <div style="text-align:left; background:white; padding:1.5rem; border-radius:12px; margin-bottom:1.5rem; border:1px solid #fbcfe8; line-height:1.8;">
          🌸 <b>面部多巴胺浓度：</b> 0.001% (极度缺乏恋爱滋润)<br>
          🌸 <b>傲娇/嘴硬判定：</b> 九段 (无药可救级别)<br>
          🌸 <b>今日颜值评级：</b> 绝美/超帅 (但可惜目前是个单身贵族)
        </div>
        <button id="btnStage3" class="btn-primary">我不服，继续复核 💢</button>
      `;
      document.getElementById('btnStage3').onclick = startStage4;
    }

    // ==================== 关卡 4：流氓全选隐私协议 ====================
    function startStage4() {
      mainCard.innerHTML = `
        <h1>🛡️ 第三轨：单身联盟隐私授权</h1>
        <p class="subtitle" style="margin-bottom:1.5rem;">为开启终极脱单绿色通道，请授权以下必要安全权限：</p>
        
        <div class="permission-item">
          <span>允许系统自动清空下季度所有购物车 🛒</span>
          <label class="switch"><input type="checkbox" checked disabled><span class="slider"></span></label>
        </div>
        <div class="permission-item">
          <span>允许公开您的朋友圈偷看及屏蔽记录 👁️</span>
          <label class="switch"><input type="checkbox" checked disabled><span class="slider"></span></label>
        </div>
        <div class="permission-item" id="trapItem" style="position:relative;">
          <span id="trapText">允许520当天无条件向站长发放节日红包 🧧</span>
          <button id="btnToggleTrap" class="btn-secondary" style="padding:0.3rem 1rem; font-size:0.9rem; border-radius:6px;">取消勾选</button>
        </div>

        <button id="btnStage4" class="btn-primary" style="margin-top:20px; width:100%;">强制同意并提交审查 🚀</button>
      `;

      const btnToggle = document.getElementById('btnToggleTrap');
      let toggleCount = 0;

      btnToggle.onclick = () => {
        toggleCount++;
        if(toggleCount === 1) { btnToggle.innerText = "拒绝失败"; } 
        else if(toggleCount === 2) { btnToggle.innerText = "你想得美"; } 
        else {
          btnToggle.style.display = "none";
          document.getElementById('trapText').innerHTML = "允许520当天无条件向站长发放节日红包 🧧 <b style='color:#ef4444;'>(已强行锁定)</b>";
        }
      };

      document.getElementById('btnStage4').onclick = startStage5;
    }

    // ==================== 关卡 5：99% 卡死终极心跳 ====================
    function startStage5() {
      const loadingTexts = [
        '正在向你的大脑植入520防渣隔离霜...',
        '正在从太空卫星调取你的脱单风水方位...',
        '系统检测到你已经开始抓狂了...',
        '正在拼命解密你的心动对象...',
        '由于您的魅力值过高，系统正在紧急扩容...'
      ];

      mainCard.innerHTML = `
        <h1>🔄 正在生成 520 终审人格报告</h1>
        <div class="progress-bound" style="margin: 30px 0;">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="progressText" style="color:#db2777; font-weight:bold;">准备初始化数据结构...</p>
      `;

      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      let width = 0;
      let textIndex = 0;

      const interval = setInterval(() => {
        if (width < 82) { width += Math.random() * 5; } 
        else if (width >= 82 && width < 99) { width += Math.random() * 0.4; }

        progressBar.style.width = `${width}%`;
        
        if (Math.random() > 0.88 && textIndex < loadingTexts.length) {
          progressText.innerText = loadingTexts[Math.floor(Math.random() * loadingTexts.length)];
        }

        if (width >= 99) {
          clearInterval(interval);
          progressBar.style.width = '99%';
          progressText.innerHTML = `⚠️ <span style="color:#ef4444; font-weight:bold;">Fatal Error：由于用户颜值突破天际，核心机房被萌烧了！</span>`;
          setTimeout(() => { triggerFinalShock(); }, 2600);
        }
      }, 90);
    }

    // ==================== 终极小丑反转（加入双栏照片展示） ====================
    function triggerFinalShock() {
      // 改变布局为炫酷的高级分栏展示
      mainCard.classList.add('final-layout');
      mainCard.style.border = "3px solid #ec4899";
      mainCard.style.boxShadow = "0 0 50px rgba(236, 72, 153, 0.4)";

      mainCard.innerHTML = `
        <div class="final-left">
          <h1 style="font-size: 3.5rem; margin: 0; display: inline-block;">🤡</h1>
          <h2 style="color:#db2777; font-size:2.2rem; margin: 5px 0 15px 0;">密保验证彻底失败！</h2>
          <p style="font-size:1.15rem; line-height:1.7; color:#4c0519; margin: 0 0 15px 0;">
            经过五轨全方位深度测试，系统最终判定：<br>
            <span style="color:#e11d48; font-weight:bold;">【嘴硬天花板】 【自恋大宗师】 【全自动发红包机】</span><br>
            折腾了这么久，原来小丑竟是你自己！
          </p>
